name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install dependencies ──────────────────────────────
      # postinstall script runs electron-rebuild automatically,
      # compiling better-sqlite3 native module for this Electron version.
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_msvs_version: '2022'

      # ── 4. Build installer ───────────────────────────────────
      # electron-builder signs automatically when CSC_LINK and
      # CSC_KEY_PASSWORD env vars are set. If they are absent it
      # builds unsigned with no errors.
      - name: Build installer
        run: npm run build:nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OV/PFX signing — only active when secret WIN_CERT_BASE64 exists
          CSC_LINK:         ${{ secrets.WIN_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

      # ── 5. Show what was built ───────────────────────────────
      - name: List output
        shell: pwsh
        run: |
          $exe = Get-ChildItem "dist\*.exe" | Select-Object -First 1
          if ($exe) {
            $sig = Get-AuthenticodeSignature $exe.FullName
            Write-Host "Built:  $($exe.Name)"
            Write-Host "Size:   $([math]::Round($exe.Length / 1MB, 1)) MB"
            Write-Host "Signed: $($sig.Status)"
          } else {
            Write-Error "No .exe found in dist\"
          }

      # ── 6. Upload .exe as artifact ───────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GRC-Assessment-Platform-Installer
          path: dist/GRC-Assessment-Platform-Setup-*.exe
          retention-days: 90

      # ── 7. Create GitHub Release on tag push ─────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GRC-Assessment-Platform-Setup-*.exe
          name: GRC Assessment Platform ${{ github.ref_name }}
          body: |
            ## GRC Assessment Platform ${{ github.ref_name }}

            ### Install
            1. Download `GRC-Assessment-Platform-Setup-*.exe`
            2. Run it — no other software required
            3. Follow the wizard (Next -> Install -> Finish)

            ### Data location
            `%APPDATA%\GRC Assessment Platform\grc_assessments.db`

            ### AI Assessment
            Open Settings after install to add your Anthropic API key.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
