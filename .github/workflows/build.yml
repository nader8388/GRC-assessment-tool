name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify environment
        shell: pwsh
        run: |
          Write-Host "Node: $(node --version)"
          Write-Host "npm:  $(npm --version)"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          npm_config_msvs_version: '2022'

      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: Verify native module compiled
        shell: pwsh
        run: |
          $node = Get-ChildItem -Recurse "node_modules\better-sqlite3\build\Release\*.node" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($node) {
            Write-Host "Native module OK: $($node.Name) ($([math]::Round($node.Length/1KB,1)) KB)"
          } else {
            Write-Error "better-sqlite3 native module not found"
            exit 1
          }

      - name: Build installer
        run: npm run build:nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify output
        shell: pwsh
        run: |
          $exe = Get-ChildItem "dist\*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Built: $($exe.Name) ($([math]::Round($exe.Length/1MB,1)) MB)"
          } else {
            Write-Error "No .exe found in dist\"
            exit 1
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GRC-Assessment-Platform-Installer
          path: dist/GRC-Assessment-Platform-Setup-*.exe
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GRC-Assessment-Platform-Setup-*.exe
          name: GRC Assessment Platform ${{ github.ref_name }}
          body: |
            ## GRC Assessment Platform ${{ github.ref_name }}

            ### Install
            1. Download `GRC-Assessment-Platform-Setup-*.exe`
            2. Run it — no other software required
            3. Follow the wizard (Next → Install → Finish)

            ### Data location
            `%APPDATA%\GRC Assessment Platform\grc_assessments.db`

            ### AI Assessment
            Open Settings after install to add your Anthropic API key.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
