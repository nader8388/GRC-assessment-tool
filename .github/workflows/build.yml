name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for manual release (e.g. 1.1.0) — leave blank to skip release'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}".StartsWith("refs/tags/v")) {
            # Tag push — strip the leading 'v'
            $ver = "${{ github.ref_name }}".TrimStart("v")
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            # Manual run with version input
            $ver = "${{ github.event.inputs.version }}"
          } else {
            # Manual run with no version — use current package.json version
            $pkg = Get-Content package.json | ConvertFrom-Json
            $ver = $pkg.version
          }
          Write-Host "Resolved version: $ver"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Stamp version into package.json
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "package.json version set to: $ver"

      - name: Verify environment
        shell: pwsh
        run: |
          Write-Host "Node: $(node --version)"
          Write-Host "npm:  $(npm --version)"
          Write-Host "Version: ${{ steps.version.outputs.VERSION }}"
          Write-Host "Trigger: ${{ github.event_name }}"
          Write-Host "Ref:     ${{ github.ref }}"

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          npm_config_msvs_version: '2022'

      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: Verify native module compiled
        shell: pwsh
        run: |
          $node = Get-ChildItem -Recurse "node_modules\better-sqlite3\build\Release\*.node" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($node) {
            Write-Host "Native module OK: $($node.Name) ($([math]::Round($node.Length/1KB,1)) KB)"
          } else {
            Write-Error "better-sqlite3 native module not found"
            exit 1
          }

      - name: Build installer
        run: npm run build:nsis
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_DRAFT:                    false
          EP_PRE_RELEASE:              false

      - name: Verify output
        shell: pwsh
        run: |
          $exe = Get-ChildItem "dist\*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Built: $($exe.Name) ($([math]::Round($exe.Length/1MB,1)) MB)"
          } else {
            Write-Error "No .exe found in dist\"
            exit 1
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GRC-Assessment-Platform-Installer-v${{ steps.version.outputs.VERSION }}
          path: dist/GRC-Assessment-Platform-Setup-*.exe
          retention-days: 90

      # Create release on tag push
      - name: Create Release (tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GRC-Assessment-Platform-Setup-*.exe
          name: GRC Assessment Platform v${{ steps.version.outputs.VERSION }}
          body: |
            ## GRC Assessment Platform v${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download `GRC-Assessment-Platform-Setup-*.exe` below
            2. Run it — no other software required
            3. Follow the wizard (Next → Install → Finish)

            ### What's included
            - 8 compliance standards (ISO 27001, FedRAMP, SOC 2, NIST CSF, PCI DSS, HIPAA, FISMA High, FISMA Moderate)
            - SQLite database — all data stored locally
            - File attachment support for evidence
            - Persistent audit log
            - AI-powered control assessment (requires Anthropic API key — add in Settings)

            ### Data location
            `%APPDATA%\GRC Assessment Platform\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create release on manual run with version
      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: dist/GRC-Assessment-Platform-Setup-*.exe
          name: GRC Assessment Platform v${{ steps.version.outputs.VERSION }}
          body: |
            ## GRC Assessment Platform v${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download `GRC-Assessment-Platform-Setup-*.exe` below
            2. Run it — no other software required
            3. Follow the wizard (Next → Install → Finish)

            ### What's included
            - 8 compliance standards (ISO 27001, FedRAMP, SOC 2, NIST CSF, PCI DSS, HIPAA, FISMA High, FISMA Moderate)
            - SQLite database — all data stored locally
            - File attachment support for evidence
            - Persistent audit log
            - AI-powered control assessment (requires Anthropic API key — add in Settings)

            ### Data location
            `%APPDATA%\GRC Assessment Platform\`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
